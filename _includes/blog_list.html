<ul style="list-style-type: none; padding-left: 0; margin-left: 0">
  <li class="blog-list">
    <em
      ><h2 class="blog"><a href="{{ post.url }}">{{ post.title }}</a></h2></em
    >
    <span style="display: inline-block; padding: 0 0 0 10px"
      ><small
        ><time datetime="{{ post.date }}"
          >{{ post.date | date: "%B %d, %Y" }}</time
        ></small
      ></span
    >

    {% comment %} {% endcomment %}

    <div class="blog-excerpt">{{ post.excerpt }}</div>

    {% if post.tags and post.tags.size > 0 %}
    <div class="tag">
      <span>Tags:</span>
      {% for tag in post.tags %}
      <a href="/archive#{{ tag | slugify }}">{{ tag }}</a>
      {% if forloop.last == false %}, {% endif %} {% endfor %}
    </div>
    {% endif %}

    <hr class="blog-list" />
  </li>
</ul>
